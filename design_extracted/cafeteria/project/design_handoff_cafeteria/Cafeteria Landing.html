<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alma Café — Especialidad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --espresso: #120b07;
      --dark-roast: #1e1009;
      --mid-roast: #2e1a0e;
      --cream: #f5ede0;
      --warm-white: #fdf8f2;
      --muted: #b09880;
      --gold: oklch(0.72 0.10 58);
      --gold-light: oklch(0.85 0.08 58);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Space Grotesk', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--espresso);
      color: var(--cream);
      font-family: var(--sans);
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--espresso); }
    ::-webkit-scrollbar-thumb { background: var(--mid-roast); border-radius: 3px; }

    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 20px 40px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.4s, padding 0.4s, backdrop-filter 0.4s;
    }
    .nav.scrolled {
      background: rgba(18,11,7,0.92);
      backdrop-filter: blur(16px);
      padding: 14px 40px;
      border-bottom: 1px solid rgba(176,152,128,0.15);
    }
    .nav-logo { font-family: var(--serif); font-size: 1.4rem; letter-spacing: 0.05em; color: var(--cream); text-decoration: none; }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a { color: var(--muted); font-size: 0.85rem; text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--cream); }
    .nav-cta {
      background: var(--gold); color: var(--espresso); border: none; cursor: pointer;
      padding: 10px 22px; font-family: var(--sans); font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase; border-radius: 2px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .nav-cta:hover { opacity: 0.88; transform: translateY(-1px); }
    .nav-mobile-btn { display: none; background: none; border: none; cursor: pointer; flex-direction: column; gap: 5px; }
    .nav-mobile-btn span { display: block; width: 24px; height: 1.5px; background: var(--cream); transition: all 0.3s; }

    /* HERO */
    .hero {
      position: relative; height: 100svh; min-height: 600px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .hero-slide {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: opacity 1.2s ease-in-out;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(18,11,7,0.55) 0%, rgba(18,11,7,0.3) 40%, rgba(18,11,7,0.8) 100%);
    }
    .hero-content {
      position: relative; z-index: 2; text-align: center;
      padding: 0 24px; max-width: 800px;
    }
    .hero-label {
      font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 20px; display: block;
    }
    .hero-title {
      font-family: var(--serif); font-size: clamp(3rem, 8vw, 6.5rem);
      line-height: 1.05; color: var(--cream); margin-bottom: 20px;
      text-shadow: 0 4px 40px rgba(0,0,0,0.5);
    }
    .hero-title em { font-style: italic; color: var(--gold-light); }
    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem); color: rgba(245,237,224,0.8);
      font-weight: 300; margin-bottom: 40px; line-height: 1.6;
    }
    .hero-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      background: var(--gold); color: var(--espresso); border: none; cursor: pointer;
      padding: 16px 36px; font-family: var(--sans); font-size: 0.85rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase; border-radius: 2px;
      transition: opacity 0.2s, transform 0.2s; text-decoration: none; display: inline-block;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-2px); }
    .btn-outline {
      background: transparent; color: var(--cream); cursor: pointer;
      padding: 15px 36px; font-family: var(--sans); font-size: 0.85rem; font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase; border-radius: 2px;
      border: 1px solid rgba(245,237,224,0.5); transition: border-color 0.2s, color 0.2s;
      text-decoration: none; display: inline-block;
    }
    .btn-outline:hover { border-color: var(--cream); color: var(--cream); }
    .hero-dots { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 3; }
    .hero-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(245,237,224,0.3); cursor: pointer; transition: background 0.3s, width 0.3s; border: none; }
    .hero-dot.active { background: var(--gold); width: 22px; border-radius: 3px; }
    .hero-scroll-hint {
      position: absolute; bottom: 36px; right: 40px; z-index: 3;
      color: rgba(245,237,224,0.4); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      writing-mode: vertical-rl; display: flex; align-items: center; gap: 10px;
    }
    .hero-scroll-hint::after {
      content: ''; display: block; width: 1px; height: 40px; background: rgba(245,237,224,0.2);
    }

    /* QUICKINFO */
    .quickinfo {
      background: var(--mid-roast);
      border-top: 1px solid rgba(176,152,128,0.15);
      border-bottom: 1px solid rgba(176,152,128,0.15);
    }
    .quickinfo-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 24px;
      display: grid; grid-template-columns: repeat(3, 1fr);
    }
    .qi-item {
      padding: 28px 24px; display: flex; gap: 16px; align-items: center;
      border-right: 1px solid rgba(176,152,128,0.12);
    }
    .qi-item:last-child { border-right: none; }
    .qi-icon {
      width: 42px; height: 42px; flex-shrink: 0;
      background: rgba(176,152,128,0.12); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .qi-icon svg { stroke: var(--gold); }
    .qi-label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .qi-value { font-family: var(--serif); font-size: 1rem; color: var(--cream); line-height: 1.3; }

    /* SECTION COMMON */
    .section { padding: 100px 24px; max-width: 1200px; margin: 0 auto; }
    .section-label { font-size: 0.72rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 14px; }
    .section-title { font-family: var(--serif); font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1.15; color: var(--cream); }
    .section-title em { font-style: italic; color: var(--gold-light); }
    .section-sub { font-size: 1rem; color: var(--muted); line-height: 1.7; max-width: 520px; margin-top: 14px; font-weight: 300; }
    .divider { width: 40px; height: 1px; background: var(--gold); margin: 24px 0; }

    /* STORY / ABOUT */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    .about-img-wrap { position: relative; }
    .about-img {
      width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block;
      border-radius: 2px;
    }
    .about-badge {
      position: absolute; bottom: -24px; right: -24px;
      width: 100px; height: 100px; border-radius: 50%;
      background: var(--gold); color: var(--espresso);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: var(--serif); line-height: 1.1;
    }
    .about-badge .yr { font-size: 1.6rem; font-weight: 700; }
    .about-badge .txt { font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; }
    .about-stats { display: flex; gap: 32px; margin-top: 40px; }
    .stat-num { font-family: var(--serif); font-size: 2.5rem; color: var(--gold); display: block; }
    .stat-desc { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.05em; }

    /* MENU */
    .menu-wrap { background: var(--dark-roast); }
    .menu-tabs { display: flex; gap: 0; border-bottom: 1px solid rgba(176,152,128,0.15); margin-bottom: 48px; }
    .menu-tab {
      padding: 12px 24px; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; border: none; background: none; color: var(--muted);
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.2s, border-color 0.2s;
      font-family: var(--sans);
    }
    .menu-tab.active { color: var(--cream); border-bottom-color: var(--gold); }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
    .menu-card {
      background: var(--mid-roast); border-radius: 4px; overflow: hidden;
      cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; border: 1px solid rgba(176,152,128,0.08);
    }
    .menu-card:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .menu-card-img-wrap { overflow: hidden; height: 200px; }
    .menu-card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; display: block; }
    .menu-card:hover .menu-card-img { transform: scale(1.07); }
    .menu-card-body { padding: 20px; }
    .menu-card-tag { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); }
    .menu-card-name { font-family: var(--serif); font-size: 1.2rem; color: var(--cream); margin: 6px 0 8px; }
    .menu-card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
    .menu-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
    .menu-card-price { font-family: var(--serif); font-size: 1.3rem; color: var(--gold); }
    .menu-card-btn {
      background: none; border: 1px solid rgba(176,152,128,0.3); color: var(--muted);
      padding: 7px 14px; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; border-radius: 2px; transition: all 0.2s; font-family: var(--sans);
    }
    .menu-card-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* GALLERY */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .gallery-item { position: relative; aspect-ratio: 1; overflow: hidden; cursor: pointer; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s; }
    .gallery-item:hover img { transform: scale(1.05); }
    .gallery-overlay {
      position: absolute; inset: 0; background: rgba(18,11,7,0.55);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-overlay svg { stroke: white; }

    /* TESTIMONIALS */
    .testimonials-wrap { background: var(--dark-roast); }
    .testimonials-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
    .testimonial-card { padding: 32px; background: var(--mid-roast); border-radius: 4px; border: 1px solid rgba(176,152,128,0.08); }
    .stars { display: flex; gap: 3px; margin-bottom: 16px; }
    .star { color: var(--gold); font-size: 0.9rem; }
    .testimonial-text { font-family: var(--serif); font-style: italic; color: var(--cream); line-height: 1.7; margin-bottom: 20px; font-size: 1rem; }
    .testimonial-author { display: flex; align-items: center; gap: 12px; }
    .testimonial-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
    .testimonial-name { font-size: 0.85rem; color: var(--cream); font-weight: 500; }
    .testimonial-loc { font-size: 0.72rem; color: var(--muted); }

    /* CTA BANNER */
    .cta-banner {
      position: relative; padding: 120px 24px;
      background-size: cover; background-position: center; background-attachment: fixed;
      text-align: center; overflow: hidden;
    }
    .cta-banner-overlay { position: absolute; inset: 0; background: rgba(18,11,7,0.78); }
    .cta-banner-content { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }
    .cta-banner-title { font-family: var(--serif); font-size: clamp(2rem, 4vw, 3rem); color: var(--cream); margin-bottom: 16px; line-height: 1.2; }
    .cta-banner-sub { color: var(--muted); font-size: 1rem; margin-bottom: 40px; line-height: 1.7; font-weight: 300; }

    /* FOOTER */
    footer { background: var(--espresso); border-top: 1px solid rgba(176,152,128,0.1); }
    .footer-inner { max-width: 1200px; margin: 0 auto; padding: 64px 24px 40px; }
    .footer-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 40px; margin-bottom: 48px; }
    .footer-logo { font-family: var(--serif); font-size: 1.6rem; color: var(--cream); margin-bottom: 14px; }
    .footer-logo span { color: var(--gold); }
    .footer-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.7; }
    .footer-heading { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; }
    .footer-links { list-style: none; }
    .footer-links li { margin-bottom: 10px; }
    .footer-links a { font-size: 0.85rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--cream); }
    .footer-bottom { border-top: 1px solid rgba(176,152,128,0.1); padding-top: 24px; display: flex; justify-content: space-between; align-items: center; }
    .footer-copy { font-size: 0.78rem; color: rgba(176,152,128,0.5); }
    .social-links { display: flex; gap: 16px; }
    .social-link {
      width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(176,152,128,0.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); text-decoration: none; transition: border-color 0.2s, color 0.2s;
    }
    .social-link:hover { border-color: var(--gold); color: var(--gold); }

    /* WHATSAPP FAB */
    .wa-fab {
      position: fixed; bottom: 32px; right: 32px; z-index: 200;
      width: 58px; height: 58px; border-radius: 50%;
      background: #25D366; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(37,211,102,0.4);
      animation: wa-pulse 2.5s ease-in-out infinite;
      text-decoration: none;
    }
    @keyframes wa-pulse {
      0%, 100% { box-shadow: 0 4px 24px rgba(37,211,102,0.4); transform: scale(1); }
      50% { box-shadow: 0 4px 40px rgba(37,211,102,0.7); transform: scale(1.06); }
    }
    .wa-fab:hover { animation: none; transform: scale(1.1); box-shadow: 0 8px 32px rgba(37,211,102,0.6); }
    .wa-tooltip {
      position: absolute; right: 70px; top: 50%; transform: translateY(-50%);
      background: var(--mid-roast); color: var(--cream); padding: 8px 14px;
      font-size: 0.78rem; white-space: nowrap; border-radius: 4px; pointer-events: none;
      border: 1px solid rgba(176,152,128,0.15);
      opacity: 0; transition: opacity 0.2s;
    }
    .wa-fab:hover .wa-tooltip { opacity: 1; }

    /* FADE ANIMATIONS */
    .fade-up { opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
    .fade-up:nth-child(2) { transition-delay: 0.1s; }
    .fade-up:nth-child(3) { transition-delay: 0.2s; }
    .fade-up:nth-child(4) { transition-delay: 0.3s; }
    .stagger-1 { transition-delay: 0s !important; }
    .stagger-2 { transition-delay: 0.12s !important; }
    .stagger-3 { transition-delay: 0.24s !important; }
    .stagger-4 { transition-delay: 0.36s !important; }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .footer-grid { grid-template-columns: 1fr 1fr; }
      .gallery-grid { grid-template-columns: repeat(3,1fr); }
    }
    @media (max-width: 768px) {
      .nav-links, .nav-cta { display: none; }
      .nav-mobile-btn { display: flex; }
      .nav { padding: 16px 24px; }
      .nav.scrolled { padding: 12px 24px; }
      .about-grid { grid-template-columns: 1fr; gap: 48px; }
      .about-badge { right: 0; }
      .quickinfo-inner { grid-template-columns: 1fr; }
      .qi-item { border-right: none; border-bottom: 1px solid rgba(176,152,128,0.12); }
      .qi-item:last-child { border-bottom: none; }
      .testimonials-grid { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: repeat(2,1fr); }
      .footer-grid { grid-template-columns: 1fr; gap: 32px; }
      .footer-bottom { flex-direction: column; gap: 16px; text-align: center; }
      .section { padding: 72px 24px; }
      .hero-scroll-hint { display: none; }
      .about-stats { flex-wrap: wrap; gap: 20px; }
    }
    @media (max-width: 480px) {
      .menu-grid { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: repeat(2,1fr); }
    }

    /* MOBILE NAV */
    .mobile-nav {
      position: fixed; inset: 0; z-index: 99;
      background: var(--espresso); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 36px;
      transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .mobile-nav.open { transform: translateX(0); }
    .mobile-nav a { font-family: var(--serif); font-size: 2rem; color: var(--cream); text-decoration: none; }
    .mobile-nav a:hover { color: var(--gold); }
    .mobile-close { position: absolute; top: 24px; right: 24px; background: none; border: none; cursor: pointer; }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── DATA ─── */
const HERO_SLIDES = [
  {

const MENU_CATEGORIES = ["Cafés", "Fríos", "Pastelería", "Brunch"];

const MENU_ITEMS = {

    { id:2, name:"Cortado de Avellana", tag:"Favorito", desc:"Espresso cortado con leche de avellanas y una nota caramelizada.", price:"$3.800", img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=600&auto=format&fit=crop&q=80" },
    { id:3, name:"Pour Over Etiopía", tag:"Origen Único", desc:"Notas frutales de arándano y flor de jazmín. Perfil claro y brillante.", price:"$4.500", img:"https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=600&auto=format&fit=crop&q=80" },
    { id:4, name:"Espresso Clásico", tag:"Base", desc:"Blend house de tostado medio-oscuro. Cuerpo pleno, crema dorada.", price:"$1.900", img:"https://images.unsplash.com/photo-1520831861-9e2a50ab8bdd?w=600&auto=format&fit=crop&q=80" },
  ],

/* ─── HOOKS ─── */
function useFadeUp(deps = []) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const targets = el.querySelectorAll ? [...el.querySelectorAll('.fade-up'), ...(el.classList.contains('fade-up') ? [el] : [])] : [];
    const allTargets = el.classList && el.classList.contains('fade-up') ? [el, ...el.querySelectorAll('.fade-up')] : el.querySelectorAll ? el.querySelectorAll('.fade-up') : [];
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.12 });
    allTargets.forEach(t => observer.observe(t));
    return () => observer.disconnect();
  }, deps);
  return ref;
}

function useSectionFade() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const targets = el.querySelectorAll('.fade-up');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.1 });
    targets.forEach(t => observer.observe(t));
    return () => observer.disconnect();
  });
  return ref;
}
